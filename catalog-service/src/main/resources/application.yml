server:
  port: 8082
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/music_catalog 
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:default-dev-secret}
